<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greenforce</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        .header { background: #4CAF50; color: white; padding: 20px; text-align: center; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 10px; }
        .gallery img { width: 100%; height: auto; }
        .testimonial { background: #f9f9f9; padding: 20px; margin: 20px 0; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Welcome to Greenforce</h1>
        <p>Your eco-friendly lifestyle starts here.</p>
    </div>
    <div class="content">
        <section class="testimonials">
            <h2>What Our Customers Are Saying</h2>
            <div class="testimonial">
                <p>"Greenforce has changed my life!" - Happy Customer</p>
            </div>
            <div class="testimonial">
                <p>"I love the products!" - Satisfied Client</p>
            </div>
        </section>
        <section class="gallery">
            <h2>Our Gallery</h2>
            <img src="image1.jpg" alt="Description of Image 1">
            <img src="image2.jpg" alt="Description of Image 2">
            <img src="image3.jpg" alt="Description of Image 3">
        </section>
    </div>
    <script>
        // Animations and responsiveness script
        document.addEventListener('DOMContentLoaded', function() {
            // Add animations or any interactive features here.
        });
    </script>
</body>
</html>
